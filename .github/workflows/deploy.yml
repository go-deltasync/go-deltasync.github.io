name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.162.1"
          extended: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs + theme
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # Hugo builds the landing page at the site root (./public); mkdocs builds
      # the documentation into ./public/docs. Hugo runs first; mkdocs only
      # cleans its own -d directory, so the landing survives.
      - name: Build landing page (Hugo)
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build documentation (mkdocs)
        run: mkdocs build --strict -d public/docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
