site_name: go-deltasync
site_description: Pure-Go, cross-platform delta-synchronization tools — zsync2 (delta updates over HTTP) and rdiff (librsync-compatible signature/delta/patch).
site_url: https://go-deltasync.github.io/
repo_url: https://github.com/go-deltasync
repo_name: go-deltasync
edit_uri: ""

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - go
    - bash
    - yaml
    - python
  navigation_depth: 3
  collapse_navigation: false
  titles_only: false
  sticky_navigation: true

nav:
  - Home: index.md
  - zsync2:
      - Quick start: zsync2/quickstart.md
      - CLI reference: zsync2/cli.md
      - Wire compatibility: zsync2/compat.md
      - "BLAKE3 strong checksum (proposal)": zsync2/proposal-blake3.md
  - rdiff:
      - Quick start: rdiff/quickstart.md
      - CLI reference: rdiff/cli.md
      - Wire compatibility: rdiff/compat.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - fenced_code
  - codehilite:
      guess_lang: false
  - tables
  - attr_list
  - def_list
  - footnotes
