site_name: zsync2
site_description: Pure-Go, cross-platform zsync — delta file updates over HTTP, byte-compatible with the C reference, with a BLAKE3 roadmap.
site_url: https://go-deltasync.github.io/
repo_url: https://github.com/go-deltasync/zsync2
repo_name: go-deltasync/zsync2
edit_uri: ""

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - go
    - bash
    - yaml
    - python
  navigation_depth: 3
  collapse_navigation: false
  titles_only: false
  sticky_navigation: true

nav:
  - Home: index.md
  - Quick start: zsync2/quickstart.md
  - CLI reference: zsync2/cli.md
  - Wire compatibility: zsync2/compat.md
  - Proposals:
      - "BLAKE3 strong checksum": zsync2/proposal-blake3.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - fenced_code
  - codehilite:
      guess_lang: false
  - tables
  - attr_list
  - def_list
  - footnotes
