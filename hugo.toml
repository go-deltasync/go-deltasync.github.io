baseURL = "https://go-deltasync.github.io/"
title = "go-deltasync"
enableGitInfo = false

[module]
  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "docs"
  BookRepo = "https://github.com/go-deltasync"
  BookServiceWorker = false
  BookSearch = true
