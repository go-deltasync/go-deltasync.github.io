baseURL = "https://go-deltasync.github.io/"
title = "go-deltasync"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.tools]]
  name = "zsync2"
  blurb = "Download only the changed bytes over plain HTTP."
  ref = "zsync"
  docs = "/docs/latest/zsync2/"
  repo = "https://github.com/go-deltasync/zsync2"
[[params.tools]]
  name = "rdiff"
  blurb = "rsync signature / delta / patch."
  ref = "librsync"
  docs = "/docs/latest/rdiff/"
  repo = "https://github.com/go-deltasync/rdiff"
[[params.tools]]
  name = "zchunk"
  blurb = "Content-defined chunked container + HTTP-Range delta."
  ref = "zchunk (Fedora/DNF)"
  docs = "/docs/latest/zchunk/"
  repo = "https://github.com/go-deltasync/zchunk"
[[params.tools]]
  name = "vcdiff"
  blurb = "VCDIFF (RFC 3284) delta encode/decode."
  ref = "xdelta3"
  docs = "/docs/latest/vcdiff/"
  repo = "https://github.com/go-deltasync/vcdiff"
[[params.tools]]
  name = "bita"
  blurb = "Differential file sync over HTTP (.cba archives)."
  ref = "oll3/bita"
  docs = "/docs/latest/bita/"
  repo = "https://github.com/go-deltasync/bita"
